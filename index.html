<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Estoque de Uniformes</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
  <div id="tela-login" class="tela-interna ativa">
    <div class="login-box">
      <div class="login-logos">
        <img src="assets/logo-prefeitura.png" alt="Logo Prefeitura" class="login-logo">
        <img src="assets/logo-secretaria.png" alt="Logo Secretaria" class="login-logo">
      </div>
      <h1>Estoque</h1>
      <form id="form-login">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" required autocomplete="username">
        <label for="login-senha">Senha</label>
        <input type="password" id="login-senha" required autocomplete="current-password">
        <button type="submit">Entrar</button>
        <p id="login-erro" class="msg-erro" role="alert"></p>
      </form>
    </div>
  </div>

  <div id="app" class="oculto">
    <header class="topo">
      <h1>Estoque de Uniformes</h1>
      <nav class="menu" aria-label="Navegação principal">
        <button class="nav-btn ativo" data-tela="dashboard">Dashboard</button>
        <button class="nav-btn" data-tela="produtos">Produtos</button>
        <button class="nav-btn" data-tela="movimentacoes">Movimentações</button>
      </nav>
      <button id="btn-logout" class="btn-secundario">Sair</button>
    </header>

    <main>
      <div id="feedback-global" class="feedback oculto"></div>

      <section id="tela-dashboard" class="tela-interna ativa">
        <div class="header-dashboard">
          <h2>Visão Geral</h2>
          <button id="btn-exportar-pdf" class="btn-primario">Exportar Relatório PDF</button>
        </div>
        <div class="cards-grid">
          <div class="card">
            <span class="card-label">Total de itens em estoque</span>
            <span class="card-valor" id="kpi-total-itens">-</span>
          </div>
          <div class="card">
            <span class="card-label">Produtos cadastrados</span>
            <span class="card-valor" id="kpi-total-produtos">-</span>
          </div>
          <div class="card card-alerta">
            <span class="card-label">Itens com estoque baixo</span>
            <span class="card-valor" id="kpi-estoque-baixo">-</span>
          </div>
        </div>
      </section>

      <section id="tela-movimentacoes" class="tela-interna">
        <h2>Entradas e Saídas</h2>
        <!-- Contêineres de formulários mantidos visualmente para brevidade -->
        
        <h3>Histórico de Movimentações</h3>
        <div class="filtros-avancados">
          <input type="text" id="busca-texto" placeholder="Buscar produto ou responsável">
          <input type="date" id="busca-data" aria-label="Filtrar por data">
          <select id="filtro-produto"><option value="">Todos os produtos</option></select>
          <select id="filtro-tipo">
            <option value="">Todos os tipos</option>
            <option value="entrada">Entradas</option>
            <option value="saida">Saídas</option>
          </select>
        </div>
        
        <div class="tabela-wrap">
          <table>
            <thead>
              <tr><th>Data</th><th>Tipo</th><th>Produto (Tamanho)</th><th>Qtd.</th><th>Retirado por</th><th>Obs.</th></tr>
            </thead>
            <tbody id="tbody-movimentacoes"></tbody>
          </table>
          <div class="paginacao-controles">
            <button id="btn-prev-mov" class="btn-secundario" disabled>&larr; Anterior</button>
            <span id="info-pagina-mov">Página 1</span>
            <button id="btn-next-mov" class="btn-secundario">Próxima &rarr;</button>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
